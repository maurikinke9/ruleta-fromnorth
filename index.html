<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gira y Gana - FromNorth</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #b8975a;
    --gold-light: #d4b47a;
    --gold-dim: rgba(184,151,90,0.3);
    --bg: #ffffff;
    --dark: #111;
    --mid: #666;
    --light: #e4e0da;
  }

  body {
    font-family: 'Montserrat', sans-serif;
    background: var(--bg);
    color: var(--dark);
    min-height: 100vh;
  }

  .container {
    max-width: 480px;
    margin: 0 auto;
    padding: 3rem 1.5rem 4rem;
    text-align: center;
  }

  .brand {
    font-size: 9px;
    letter-spacing: 6px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 1.4rem;
  }

  .title-line {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 0.6rem;
  }

  .title-ornament {
    width: 40px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold));
  }
  .title-ornament.right {
    background: linear-gradient(90deg, var(--gold), transparent);
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 38px;
    font-weight: 300;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--dark);
  }

  .subtitle {
    font-size: 11px;
    letter-spacing: 2.5px;
    color: var(--mid);
    text-transform: uppercase;
    margin-bottom: 2.5rem;
    line-height: 2;
  }

  .wheel-stage {
    position: relative;
    width: 340px;
    height: 340px;
    margin: 0 auto 2rem;
  }

  .wheel-outer {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    box-shadow: 0 8px 40px rgba(0,0,0,0.1);
  }

  .wheel-wrap {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    overflow: hidden;
  }

  canvas#wheel { display: block; }

  .pointer-wrap {
    position: absolute;
    right: -4px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 20;
  }

  .pointer-wrap svg {
    width: 36px;
    height: 18px;
    filter: drop-shadow(-2px 0 4px rgba(0,0,0,0.15));
  }

  .center-circle {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: var(--bg);
    border: 1px solid var(--gold);
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    color: var(--gold);
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
  }

  .center-circle:hover {
    background: var(--gold);
    color: var(--bg);
    transform: translate(-50%, -50%) scale(1.06);
  }

  #spinBtn {
    padding: 15px 52px;
    font-family: 'Montserrat', sans-serif;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 5px;
    text-transform: uppercase;
    background: transparent;
    color: var(--dark);
    border: 1px solid var(--dark);
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }

  #spinBtn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--dark);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s ease;
    z-index: -1;
  }

  #spinBtn:hover { color: #fff; border-color: var(--dark); }
  #spinBtn:hover::after { transform: scaleX(1); }
  #spinBtn:disabled { opacity: 0.3; cursor: not-allowed; }
  #spinBtn:disabled::after { display: none; }

  .result-box {
    display: none;
    margin-top: 2.5rem;
    animation: fadeUp 0.5s ease forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .result-inner {
    padding: 2rem;
    border: 1px solid var(--light);
    background: #fafafa;
    position: relative;
  }

  .result-inner::before,
  .result-inner::after {
    content: '';
    position: absolute;
    width: 16px;
    height: 16px;
    border-color: var(--gold);
    border-style: solid;
  }
  .result-inner::before { top: 8px; left: 8px; border-width: 1px 0 0 1px; }
  .result-inner::after  { bottom: 8px; right: 8px; border-width: 0 1px 1px 0; }

  .prize-label {
    font-size: 9px;
    letter-spacing: 4px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 0.6rem;
  }

  .result-inner h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 400;
    color: var(--dark);
    margin-bottom: 0.75rem;
    letter-spacing: 1px;
  }

  .result-inner p {
    font-size: 12px;
    color: var(--mid);
    line-height: 1.8;
    letter-spacing: 0.3px;
    margin-bottom: 1.5rem;
  }

  .coupon-wrap { margin-bottom: 1.5rem; }

  .coupon-label {
    font-size: 8px;
    letter-spacing: 3px;
    color: var(--mid);
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }

  .coupon-code {
    font-family: 'Courier New', monospace;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 8px;
    color: var(--dark);
    padding: 12px 24px;
    border: 1px dashed var(--gold);
    display: inline-block;
    background: rgba(184,151,90,0.05);
  }

  .checkout-btn {
    display: inline-block;
    padding: 14px 40px;
    background: var(--dark);
    color: #fff;
    font-family: 'Montserrat', sans-serif;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 4px;
    text-transform: uppercase;
    text-decoration: none;
    transition: all 0.2s;
    border: 1px solid var(--dark);
  }

  .checkout-btn:hover { background: transparent; color: var(--dark); }

  .no-prize-text {
    font-size: 12px;
    color: var(--mid);
    line-height: 1.8;
    margin-bottom: 1.5rem;
    letter-spacing: 0.3px;
  }

  /* Loading / Error */
  .loading-box {
    margin-top: 1.5rem;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--mid);
    text-transform: uppercase;
  }

  .error-box {
    display: none;
    margin-top: 1.5rem;
    padding: 1.2rem 1.5rem;
    border: 1px solid #ddd;
    font-size: 12px;
    color: var(--mid);
    line-height: 1.7;
  }

  .footer {
    margin-top: 3rem;
    font-size: 9px;
    letter-spacing: 5px;
    color: rgba(0,0,0,0.18);
    text-transform: uppercase;
  }

  .confetti-piece {
    position: fixed;
    top: -10px;
    pointer-events: none;
    z-index: 9999;
    animation: confettiFall linear forwards;
  }

  @keyframes confettiFall {
    0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(540deg); opacity: 0; }
  }
</style>
</head>
<body>
<div class="container">

  <p class="brand">FromNorth</p>

  <div class="title-line">
    <span class="title-ornament"></span>
    <h1>Gira y Gana</h1>
    <span class="title-ornament right"></span>
  </div>

  <p class="subtitle">Tenés un premio esperándote<br>Girá la ruleta y descubrilo</p>

  <div class="wheel-stage">
    <div class="wheel-outer"></div>

    <div class="pointer-wrap">
      <svg viewBox="0 0 36 18" xmlns="http://www.w3.org/2000/svg">
        <polygon points="0,9 28,0 36,9 28,18" fill="#b8975a"/>
        <polygon points="4,9 28,2 34,9 28,16" fill="#d4b47a" opacity="0.4"/>
      </svg>
    </div>

    <div class="wheel-wrap">
      <canvas id="wheel" width="340" height="340"></canvas>
    </div>

    <div class="center-circle" id="centerBtn" onclick="spin()">✦</div>
  </div>

  <button id="spinBtn" onclick="spin()" disabled>Cargando</button>

  <div class="loading-box" id="loadingBox">Verificando acceso</div>
  <div class="error-box" id="errorBox"></div>
  <div class="result-box" id="resultBox"></div>

  <div class="footer">@from.north_</div>
</div>

<script>
// ============================================================
const WEBHOOK_CHECK = 'https://devn8n.santafeia.shop/webhook/check-ruleta';
const WEBHOOK_SAVE  = 'https://devn8n.santafeia.shop/webhook/save-ruleta';
// ============================================================

const params = new URLSearchParams(window.location.search);
const EMAIL  = (params.get('email') || '').trim().toLowerCase();

const segments = [
  { label: "1 prenda\ngratis",    dark: true,  prize: "1 Camisa gratis",   msg: "Usá el código al finalizar tu compra y llevate 1 Camisa sin costo.", tipo: "percentage", valor: "100" },
  { label: "10%\ndescuento",      dark: false, prize: "10% de descuento",  msg: "Aplicá el código en tu carrito y obtenete un 10% off en toda la tienda.",      tipo: "percentage", valor: "10"  },
  { label: "Seguí\nparticipando", dark: true,  prize: null,                 msg: null,                                                                            tipo: null,         valor: null  },
  { label: "Envío\ngratis",       dark: false, prize: "Envío gratis",       msg: "Usá el código y recibís tu pedido sin costo de envío.",                        tipo: "shipping",   valor: "0"   },
  { label: "30%\ndescuento",      dark: true,  prize: "30% de descuento",  msg: "Aplicá el código en tu carrito y obtenete un 30% off. ¡Aprovechalo ahora!",   tipo: "percentage", valor: "30"  },
  { label: "Seguí\nparticipando", dark: false, prize: null,                 msg: null,                                                                            tipo: null,         valor: null  },
  { label: "5%\ndescuento",       dark: true,  prize: "5% de descuento",   msg: "Aplicá el código y obtenete un 5% off en toda la tienda.",                     tipo: "percentage", valor: "5"   },
  { label: "Seguí\nparticipando", dark: false, prize: null,                 msg: null,                                                                            tipo: null,         valor: null  },
  { label: "Envío\ngratis",       dark: true,  prize: "Envío gratis",       msg: "Usá el código y recibís tu pedido sin costo de envío.",                        tipo: "shipping",   valor: "0"   },
  { label: "Seguí\nparticipando", dark: false, prize: null,                 msg: null,                                                                            tipo: null,         valor: null  },
  { label: "10%\ndescuento",      dark: true,  prize: "10% de descuento",  msg: "Aplicá el código en tu carrito y obtenete un 10% off en toda la tienda.",      tipo: "percentage", valor: "10"  },
  { label: "5%\ndescuento",       dark: false, prize: "5% de descuento",   msg: "Aplicá el código y obtenete un 5% off en tu compra.",                          tipo: "percentage", valor: "5"   },
];

const n   = segments.length;
const arc = (2 * Math.PI) / n;
let currentAngle = 0;
let spinning = false;
let hasSpun  = false;

const canvas = document.getElementById('wheel');
const ctx    = canvas.getContext('2d');
const size   = 340;
const cx = size / 2, cy = size / 2, r = size / 2 - 1;

const GOLD = '#b8975a';

function segColor(i) {
  const s = segments[i];
  if (!s.prize) return i % 2 === 0 ? '#404040' : '#505050';
  return s.dark
    ? (i % 2 === 0 ? '#111111' : '#1e1e1e')
    : (i % 2 === 0 ? '#444444' : '#555555');
}

function drawWheel(angle) {
  ctx.clearRect(0, 0, size, size);

  for (let i = 0; i < n; i++) {
    const start = angle + i * arc;
    const end   = start + arc;

    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, end);
    ctx.closePath();
    ctx.fillStyle = segColor(i);
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(start) * r, cy + Math.sin(start) * r);
    ctx.strokeStyle = 'rgba(184,151,90,0.35)';
    ctx.lineWidth = 1;
    ctx.stroke();

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(start + arc / 2);
    ctx.textAlign = 'right';
    ctx.font = '700 11px Montserrat, sans-serif';
    const lines = segments[i].label.split('\n');
    lines.forEach((line, li) => {
      const yOff = (li - (lines.length - 1) / 2) * 15;
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.fillText(line, r - 11, yOff + 5);
      ctx.fillStyle = '#ffffff';
      ctx.fillText(line, r - 12, yOff + 4);
    });
    ctx.restore();
  }

  ctx.beginPath();
  ctx.arc(cx, cy, 26, 0, 2 * Math.PI);
  ctx.fillStyle = '#ffffff';
  ctx.fill();
  ctx.strokeStyle = GOLD;
  ctx.lineWidth = 1;
  ctx.stroke();
}

drawWheel(0);

// ============================================================
// VERIFICACIÓN
// ============================================================
async function verificarAcceso() {
  const loadingBox = document.getElementById('loadingBox');
  const spinBtn    = document.getElementById('spinBtn');
  const centerBtn  = document.getElementById('centerBtn');
  const errorBox   = document.getElementById('errorBox');

  if (!EMAIL) {
    loadingBox.style.display = 'none';
    errorBox.style.display = 'block';
    errorBox.innerHTML = 'Este link no es válido. Revisá el mail que recibiste y usá el botón original.';
    spinBtn.disabled = true;
    centerBtn.onclick = null;
    return;
  }

  try {
    const res  = await fetch(`${WEBHOOK_CHECK}?email=${encodeURIComponent(EMAIL)}`);
    const data = await res.json();
    loadingBox.style.display = 'none';

    if (data.puede === false) {
      hasSpun = true;
      spinBtn.disabled = true;
      centerBtn.onclick = null;
      mostrarPremio(data.premio, data.codigo, data.mensaje, true);
    } else {
      spinBtn.disabled = false;
      spinBtn.textContent = 'Girar Ruleta';
    }
  } catch (e) {
    loadingBox.style.display = 'none';
    errorBox.style.display = 'block';
    errorBox.innerHTML = 'Hubo un error al verificar tu acceso. Intentá de nuevo en unos minutos.';
    spinBtn.disabled = true;
  }
}

verificarAcceso();

// ============================================================
// GIRAR
// ============================================================
function spin() {
  if (spinning || hasSpun) return;
  spinning = true;
  hasSpun  = true;
  document.getElementById('spinBtn').disabled = true;
  document.getElementById('resultBox').style.display = 'none';

  const extraSpins  = 6 + Math.random() * 4;
  const targetAngle = currentAngle + extraSpins * 2 * Math.PI + Math.random() * 2 * Math.PI;
  const duration    = 5000;
  const start       = performance.now();
  const startAngle  = currentAngle;

  function easeOut(t) { return 1 - Math.pow(1 - t, 4); }

  function animate(now) {
    const elapsed = now - start;
    const t = Math.min(elapsed / duration, 1);
    currentAngle = startAngle + (targetAngle - startAngle) * easeOut(t);
    drawWheel(currentAngle);
    if (t < 1) {
      requestAnimationFrame(animate);
    } else {
      spinning = false;
      guardarYMostrar();
    }
  }

  requestAnimationFrame(animate);
}

// ============================================================
// GUARDAR Y MOSTRAR
// ============================================================
async function guardarYMostrar() {
  const pointerAngle    = 0;
  const normalizedAngle = ((pointerAngle - currentAngle) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
  const index = Math.floor(normalizedAngle / arc) % n;
  const seg   = segments[index];

  let codigoGenerado = null;
  try {
    const res  = await fetch(WEBHOOK_SAVE, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email:   EMAIL,
        premio:  seg.prize  || 'Seguí participando',
        mensaje: seg.msg    || '',
        tipo:    seg.tipo   || null,
        valor:   seg.valor  || null
      })
    });
    const data = await res.json();
    codigoGenerado = data.codigo || null;
  } catch(e) {
    console.error('Error guardando resultado:', e);
  }

  mostrarPremio(seg.prize, codigoGenerado, seg.msg, false);
}

// ============================================================
// MOSTRAR PREMIO
// ============================================================
function mostrarPremio(prize, code, msg, yaGiro) {
  const box = document.getElementById('resultBox');
  box.style.display = 'block';

  if (prize && prize !== 'Seguí participando') {
    if (!yaGiro) launchConfetti();
    const etiqueta = yaGiro ? 'Tu premio guardado' : '¡Tu premio!';
    box.innerHTML = `
      <div class="result-inner">
        <p class="prize-label">${etiqueta}</p>
        <h2>${prize}</h2>
        <p>${msg || ''}</p>
        ${code ? `
        <div class="coupon-wrap">
          <p class="coupon-label">Código de descuento</p>
          <div class="coupon-code">${code}</div>
        </div>` : ''}
        <a class="checkout-btn" href="https://fromnorth.store" target="_blank">Ir a la tienda</a>
      </div>
    `;
  } else {
    box.innerHTML = `
      <div class="result-inner">
        <p class="prize-label">Esta vez no fue</p>
        <h2>Seguí participando</h2>
        <p class="no-prize-text">Tu carrito sigue esperándote con todo lo que te gustó.</p>
        <a class="checkout-btn" href="https://fromnorth.store" target="_blank">Ver mi carrito</a>
      </div>
    `;
  }
}

function launchConfetti() {
  const colors = ['#b8975a', '#d4b47a', '#1a1a1a', '#999', '#e2ddd6'];
  for (let i = 0; i < 60; i++) {
    setTimeout(() => {
      const p = document.createElement('div');
      p.className = 'confetti-piece';
      p.style.left = Math.random() * 100 + 'vw';
      p.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
      const s = 4 + Math.random() * 6;
      p.style.width  = s + 'px';
      p.style.height = s + 'px';
      p.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
      p.style.animationDuration = (2.5 + Math.random() * 2) + 's';
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 5000);
    }, i * 35);
  }
}
</script>
</body>
</html>
