<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gira y Gana - FromNorth</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #b8975a;
    --gold-light: #d4b47a;
    --gold-dim: rgba(184,151,90,0.3);
    --bg: #ffffff;
    --dark: #111;
    --mid: #666;
    --light: #e4e0da;
  }

  body {
    font-family: 'Montserrat', sans-serif;
    background: var(--bg);
    color: var(--dark);
    min-height: 100vh;
  }

  .container {
    max-width: 480px;
    margin: 0 auto;
    padding: 3rem 1.5rem 4rem;
    text-align: center;
  }

  .brand {
    font-size: 9px;
    letter-spacing: 6px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 1.4rem;
  }

  .title-line {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 0.6rem;
  }

  .title-ornament {
    width: 40px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold));
  }
  .title-ornament.right {
    background: linear-gradient(90deg, var(--gold), transparent);
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 38px;
    font-weight: 300;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--dark);
  }

  .subtitle {
    font-size: 11px;
    letter-spacing: 2.5px;
    color: var(--mid);
    text-transform: uppercase;
    margin-bottom: 2.5rem;
    line-height: 2;
  }

  .wheel-stage {
    position: relative;
    width: 340px;
    height: 340px;
    margin: 0 auto 2rem;
  }

  .wheel-outer {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    box-shadow: 0 8px 40px rgba(0,0,0,0.1);
  }

  .wheel-outer::before { display: none; }

  .wheel-wrap {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    overflow: hidden;
  }

  canvas#wheel { display: block; }

  .pointer-wrap {
    position: absolute;
    right: -4px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 20;
  }

  .pointer-wrap svg {
    width: 36px;
    height: 18px;
    filter: drop-shadow(-2px 0 4px rgba(0,0,0,0.15));
  }

  .center-circle {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: var(--bg);
    border: 1px solid var(--gold);
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    color: var(--gold);
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
  }

  .center-circle:hover {
    background: var(--gold);
    color: var(--bg);
    transform: translate(-50%, -50%) scale(1.06);
  }

  #spinBtn {
    padding: 15px 52px;
    font-family: 'Montserrat', sans-serif;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 5px;
    text-transform: uppercase;
    background: transparent;
    color: var(--dark);
    border: 1px solid var(--dark);
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }

  #spinBtn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--dark);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s ease;
    z-index: -1;
  }

  #spinBtn:hover { color: #fff; border-color: var(--dark); }
  #spinBtn:hover::after { transform: scaleX(1); }
  #spinBtn:disabled { opacity: 0.3; cursor: not-allowed; }
  #spinBtn:disabled::after { display: none; }

  .result-box {
    display: none;
    margin-top: 2.5rem;
    animation: fadeUp 0.5s ease forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .result-inner {
    padding: 2rem;
    border: 1px solid var(--light);
    background: #fafafa;
    position: relative;
  }

  .result-inner::before,
  .result-inner::after {
    content: '';
    position: absolute;
    width: 16px;
    height: 16px;
    border-color: var(--gold);
    border-style: solid;
  }
  .result-inner::before { top: 8px; left: 8px; border-width: 1px 0 0 1px; }
  .result-inner::after  { bottom: 8px; right: 8px; border-width: 0 1px 1px 0; }

  .prize-label {
    font-size: 9px;
    letter-spacing: 4px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 0.6rem;
  }

  .result-inner h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 400;
    color: var(--dark);
    margin-bottom: 0.75rem;
    letter-spacing: 1px;
  }

  .result-inner p {
    font-size: 12px;
    color: var(--mid);
    line-height: 1.8;
    letter-spacing: 0.3px;
    margin-bottom: 1.5rem;
  }

  .coupon-wrap { margin-bottom: 1.5rem; }

  .coupon-label {
    font-size: 8px;
    letter-spacing: 3px;
    color: var(--mid);
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }

  .coupon-code {
    font-family: 'Courier New', monospace;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 8px;
    color: var(--dark);
    padding: 12px 24px;
    border: 1px dashed var(--gold);
    display: inline-block;
    background: rgba(184,151,90,0.05);
  }

  .checkout-btn {
    display: inline-block;
    padding: 14px 40px;
    background: var(--dark);
    color: #fff;
    font-family: 'Montserrat', sans-serif;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 4px;
    text-transform: uppercase;
    text-decoration: none;
    transition: all 0.2s;
    border: 1px solid var(--dark);
  }

  .checkout-btn:hover { background: transparent; color: var(--dark); }

  .no-prize-text {
    font-size: 12px;
    color: var(--mid);
    line-height: 1.8;
    margin-bottom: 1.5rem;
    letter-spacing: 0.3px;
  }

  .footer {
    margin-top: 3rem;
    font-size: 9px;
    letter-spacing: 5px;
    color: rgba(0,0,0,0.18);
    text-transform: uppercase;
  }

  .confetti-piece {
    position: fixed;
    top: -10px;
    pointer-events: none;
    z-index: 9999;
    animation: confettiFall linear forwards;
  }

  @keyframes confettiFall {
    0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(540deg); opacity: 0; }
  }
</style>
</head>
<body>
<div class="container">

  <p class="brand">FromNorth</p>

  <div class="title-line">
    <span class="title-ornament"></span>
    <h1>Gira y Gana</h1>
    <span class="title-ornament right"></span>
  </div>

  <p class="subtitle">Tenés un premio esperándote<br>Girá la ruleta y descubrilo</p>

  <div class="wheel-stage">
    <div class="wheel-outer"></div>

    <div class="pointer-wrap">
      <svg viewBox="0 0 36 18" xmlns="http://www.w3.org/2000/svg">
        <polygon points="0,9 28,0 36,9 28,18" fill="#b8975a"/>
        <polygon points="4,9 28,2 34,9 28,16" fill="#d4b47a" opacity="0.4"/>
      </svg>
    </div>

    <div class="wheel-wrap">
      <canvas id="wheel" width="340" height="340"></canvas>
    </div>

    <div class="center-circle" onclick="spin()">✦</div>
  </div>

  <button id="spinBtn" onclick="spin()">Girar Ruleta</button>

  <div class="result-box" id="resultBox"></div>

  <div class="footer">@from.north_</div>
</div>

<script>
const segments = [
  { label: "1 camisa\ngratis",    dark: true,  code: "RULETA 1", prize: "1 camisa gratis",   msg: "Usá el código al finalizar tu compra y llevate la Camisa Basic Snow sin costo." },
  { label: "10%\ndescuento",      dark: false, code: "RULETA 3", prize: "10% de descuento",  msg: "Aplicá el código en tu carrito y obtenete un 10% off en toda la tienda." },
  { label: "Seguí\nparticipando", dark: true,  code: null,       prize: null,                msg: null },
  { label: "Envío\ngratis",       dark: false, code: "RULETA 5", prize: "Envío gratis",       msg: "Usá el código y recibís tu pedido sin costo de envío." },
  { label: "30%\ndescuento",      dark: true,  code: "RULETA 2", prize: "30% de descuento",  msg: "Aplicá el código en tu carrito y obtenete un 30% off. ¡Aprovechalo ahora!" },
  { label: "Seguí\nparticipando", dark: false, code: null,       prize: null,                msg: null },
  { label: "5%\ndescuento",       dark: true,  code: "RULETA 4", prize: "5% de descuento",   msg: "Aplicá el código y obtenete un 5% off en toda la tienda." },
  { label: "Seguí\nparticipando", dark: false, code: null,       prize: null,                msg: null },
  { label: "Envío\ngratis",       dark: true,  code: "RULETA 5", prize: "Envío gratis",       msg: "Usá el código y recibís tu pedido sin costo de envío." },
  { label: "Seguí\nparticipando", dark: false, code: null,       prize: null,                msg: null },
  { label: "10%\ndescuento",      dark: true,  code: "RULETA 3", prize: "10% de descuento",  msg: "Aplicá el código en tu carrito y obtenete un 10% off en toda la tienda." },
  { label: "5%\ndescuento",       dark: false, code: "RULETA 4", prize: "5% de descuento",   msg: "Aplicá el código y obtenete un 5% off en tu compra." },
];

const n = segments.length;
const arc = (2 * Math.PI) / n;
let currentAngle = 0;
let spinning = false;
let hasSpun = false;

const canvas = document.getElementById('wheel');
const ctx = canvas.getContext('2d');
const size = 340;
const cx = size / 2, cy = size / 2, r = size / 2 - 1;

const GOLD     = '#b8975a';
const GOLD_DIM = 'rgba(184,151,90,0.22)';

function segColor(i) {
  const s = segments[i];
  if (!s.code) return i % 2 === 0 ? '#404040' : '#505050'; // dark gray for no-prize
  return s.dark
    ? (i % 2 === 0 ? '#111111' : '#1e1e1e')
    : (i % 2 === 0 ? '#444444' : '#555555');
}

function textColor(i) {
  return '#ffffff'; // white on every segment
}

function drawWheel(angle) {
  ctx.clearRect(0, 0, size, size);

  for (let i = 0; i < n; i++) {
    const start = angle + i * arc;
    const end   = start + arc;

    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, end);
    ctx.closePath();
    ctx.fillStyle = segColor(i);
    ctx.fill();

    // Gold divider
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(start) * r, cy + Math.sin(start) * r);
    ctx.strokeStyle = 'rgba(184,151,90,0.35)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Text
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(start + arc / 2);
    ctx.textAlign = 'right';
    ctx.font = `700 11px Montserrat, sans-serif`;
    const lines = segments[i].label.split('\n');
    lines.forEach((line, li) => {
      const yOff = (li - (lines.length - 1) / 2) * 15;
      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.fillText(line, r - 11, yOff + 5);
      // Text
      ctx.fillStyle = textColor(i);
      ctx.fillText(line, r - 12, yOff + 4);
    });
    ctx.restore();
  }

  // Center disk
  ctx.beginPath();
  ctx.arc(cx, cy, 26, 0, 2 * Math.PI);
  ctx.fillStyle = '#ffffff';
  ctx.fill();
  ctx.strokeStyle = GOLD;
  ctx.lineWidth = 1;
  ctx.stroke();
}

drawWheel(0);

function spin() {
  if (spinning || hasSpun) return;
  spinning = true;
  hasSpun = true;
  document.getElementById('spinBtn').disabled = true;
  document.getElementById('resultBox').style.display = 'none';

  const extraSpins = 6 + Math.random() * 4;
  const targetAngle = currentAngle + extraSpins * 2 * Math.PI + Math.random() * 2 * Math.PI;
  const duration = 5000;
  const start = performance.now();
  const startAngle = currentAngle;

  function easeOut(t) { return 1 - Math.pow(1 - t, 4); }

  function animate(now) {
    const elapsed = now - start;
    const t = Math.min(elapsed / duration, 1);
    currentAngle = startAngle + (targetAngle - startAngle) * easeOut(t);
    drawWheel(currentAngle);
    if (t < 1) {
      requestAnimationFrame(animate);
    } else {
      spinning = false;
      showResult();
    }
  }
  requestAnimationFrame(animate);
}

function showResult() {
  const pointerAngle = 0;
  const norm = ((pointerAngle - currentAngle) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
  const index = Math.floor(norm / arc) % n;
  const seg = segments[index];
  const box = document.getElementById('resultBox');
  box.style.display = 'block';

  if (seg.code) {
    launchConfetti();
    box.innerHTML = `
      <div class="result-inner">
        <p class="prize-label">¡Tu premio!</p>
        <h2>${seg.prize}</h2>
        <p>${seg.msg}</p>
        <div class="coupon-wrap">
          <p class="coupon-label">Código de descuento</p>
          <div class="coupon-code">${seg.code}</div>
        </div>
        <a class="checkout-btn" href="https://fromnorth.store" target="_blank">Ir a la tienda</a>
      </div>
    `;
  } else {
    box.innerHTML = `
      <div class="result-inner">
        <p class="prize-label">Esta vez no fue</p>
        <h2>Seguí participando</h2>
        <p class="no-prize-text">Tu carrito sigue esperándote con todo lo que te gustó.</p>
        <a class="checkout-btn" href="https://fromnorth.store" target="_blank">Ir a la tienda</a>
      </div>
    `;
  }
}

function launchConfetti() {
  const colors = ['#b8975a', '#d4b47a', '#1a1a1a', '#999', '#e2ddd6'];
  for (let i = 0; i < 60; i++) {
    setTimeout(() => {
      const p = document.createElement('div');
      p.className = 'confetti-piece';
      p.style.left = Math.random() * 100 + 'vw';
      p.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
      const s = 4 + Math.random() * 6;
      p.style.width = s + 'px';
      p.style.height = s + 'px';
      p.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
      p.style.animationDuration = (2.5 + Math.random() * 2) + 's';
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 5000);
    }, i * 35);
  }
}
</script>
</body>
</html>
